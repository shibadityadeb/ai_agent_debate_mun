services:
  - type: web
    name: diplomatrix-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHONPATH
        value: /opt/render/project/backend
      - key: CORS_ALLOW_ORIGINS
        value: http://localhost:3000,http://localhost:5173,https://ai-debate-mun.vercel.app,https://diplomatrix-ai.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: ENABLE_TOPIC_RETRIEVAL
        value: false
      - key: GROQ_TIMEOUT_SECONDS
        value: 12
      - key: GROQ_MAX_RETRIES
        value: 2
